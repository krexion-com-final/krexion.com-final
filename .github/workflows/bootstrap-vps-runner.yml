name: Bootstrap Permanent VPS Runner

# 2026-01-09 — ONE-SHOT workflow that SSHs into the customer VPS and
# installs a PERMANENT GitHub Actions self-hosted runner there as a
# systemd service. After this runs once, every future push to main
# will deploy automatically WITHOUT touching the org's GitHub Actions
# minute quota. Runner name: "krexion-vps"  label: "krexion-vps".
#
# Uses VPS_HOST / VPS_USER / VPS_PORT / VPS_SSH_KEY secrets already
# configured in this repo. No user action required.
#
# Delete this file after the runner is confirmed online.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Install permanent runner on VPS
    runs-on: [self-hosted, bootstrap]

    steps:
      - name: Checkout code (for context only)
        uses: actions/checkout@v4

      - name: Install rsync + ssh on bootstrap runner
        run: |
          which rsync || (apt-get update -qq && apt-get install -y -qq rsync)
          which ssh   || (apt-get update -qq && apt-get install -y -qq openssh-client)

      - name: Configure SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_deploy
          chmod 600 ~/.ssh/vps_deploy
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Get fresh registration token for permanent runner
        id: token
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use built-in GITHUB_TOKEN — has actions:write scope for the
          # current repo which is enough to create a runner reg token.
          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token")
          RTOKEN=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          echo "::add-mask::$RTOKEN"
          echo "runner_token=$RTOKEN" >> $GITHUB_OUTPUT

      - name: Install runner on VPS via SSH
        env:
          RUNNER_TOKEN: ${{ steps.token.outputs.runner_token }}
        run: |
          ssh -i ~/.ssh/vps_deploy -p ${{ secrets.VPS_PORT || 22 }} \
              -o StrictHostKeyChecking=accept-new \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "RUNNER_TOKEN='$RUNNER_TOKEN' REPO_URL='https://github.com/${{ github.repository }}' bash -s" << 'ENDSSH'
          set -e
          echo "==============================================="
          echo "  Installing PERMANENT GitHub Actions runner"
          echo "  VPS: $(hostname) · $(uname -m) · $(whoami)"
          echo "==============================================="

          # ── Idempotency: if the runner is already installed AND running,
          #     just exit successfully. Re-runs of this workflow are safe.
          RUNNER_DIR=/opt/krexion-runner
          if [ -f "$RUNNER_DIR/.runner" ] && systemctl is-active --quiet krexion-runner 2>/dev/null; then
            echo "✓ Runner already installed + service active — nothing to do"
            systemctl status krexion-runner --no-pager | head -15
            exit 0
          fi

          # ── Prep: dependencies (curl, tar, sudo, systemd — all standard)
          command -v curl >/dev/null || (apt-get update -qq && apt-get install -y -qq curl)
          command -v tar  >/dev/null || (apt-get update -qq && apt-get install -y -qq tar)

          # ── Detect architecture (amd64 / arm64)
          ARCH_RAW=$(uname -m)
          case "$ARCH_RAW" in
            x86_64)  RUNNER_ARCH=x64   ;;
            aarch64) RUNNER_ARCH=arm64 ;;
            arm64)   RUNNER_ARCH=arm64 ;;
            *) echo "Unsupported arch: $ARCH_RAW"; exit 1 ;;
          esac
          echo "→ arch=$RUNNER_ARCH"

          # ── Download runner (latest stable v2.320.0 — auto-upgrades on connect)
          mkdir -p "$RUNNER_DIR"
          cd "$RUNNER_DIR"

          # If a partial old install exists, wipe .runner and .credentials
          # ONLY (keep _work cache for faster subsequent restarts).
          rm -f .runner .credentials .credentials_rsaparams
          # If the binary is missing (fresh install), download it
          if [ ! -f config.sh ]; then
            RUNNER_VER="2.320.0"
            echo "→ Downloading runner v$RUNNER_VER for linux-$RUNNER_ARCH"
            curl -sL -o /tmp/runner.tgz \
              "https://github.com/actions/runner/releases/download/v${RUNNER_VER}/actions-runner-linux-${RUNNER_ARCH}-${RUNNER_VER}.tar.gz"
            tar xzf /tmp/runner.tgz -C "$RUNNER_DIR"
            rm -f /tmp/runner.tgz
            # Best-effort deps install
            ./bin/installdependencies.sh 2>&1 | tail -3 || true
          fi

          # ── Configure runner
          # Runs as root (VPS is Docker host, root is common). If you
          # want a dedicated user, `useradd -m gharunner && chown -R
          # gharunner $RUNNER_DIR` before this step.
          export RUNNER_ALLOW_RUNASROOT=1
          ./config.sh \
            --url "$REPO_URL" \
            --token "$RUNNER_TOKEN" \
            --name "krexion-vps" \
            --labels "self-hosted,linux,krexion-vps" \
            --work _work \
            --unattended \
            --replace
          echo "→ Runner configured"

          # ── Install as systemd service so it survives reboots
          # Note: the runner ships svc.sh which does exactly this and
          # auto-detects the right user + working dir.
          ./svc.sh install root 2>&1 | tail -5
          ./svc.sh start   2>&1 | tail -5

          # Rename systemd unit to something predictable for future
          # `systemctl status krexion-runner` calls.
          # svc.sh creates a unit like actions.runner.<owner>-<repo>.krexion-vps.service
          # We create a symlink alias for convenience.
          ACTIONS_UNIT=$(systemctl list-unit-files 'actions.runner.*krexion-vps*' --no-legend --no-pager | awk 'NR==1{print $1}')
          if [ -n "$ACTIONS_UNIT" ]; then
            ln -sf "/etc/systemd/system/$ACTIONS_UNIT" /etc/systemd/system/krexion-runner.service 2>/dev/null || true
            systemctl daemon-reload || true
            echo "→ Alias: /etc/systemd/system/krexion-runner.service → $ACTIONS_UNIT"
          fi

          # ── Verify
          sleep 6
          echo "==============================================="
          echo "  Runner install SUCCESS"
          echo "==============================================="
          ./svc.sh status 2>&1 | head -10 || systemctl status "$ACTIONS_UNIT" --no-pager | head -10
          echo "==============================================="
          ENDSSH

      - name: Wait for runner to appear online in GitHub
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 5
            STATE=$(curl -s -H "Authorization: Bearer $GH_PAT" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
              | python3 -c "import sys,json
d = json.load(sys.stdin)
for r in d.get('runners', []):
    if r['name'] == 'krexion-vps':
        print(r['status']); break
else:
    print('missing')")
            echo "attempt $i: krexion-vps status=$STATE"
            if [ "$STATE" = "online" ]; then
              echo "✅ Permanent VPS runner is ONLINE — future deploys will use it automatically"
              exit 0
            fi
          done
          echo "❌ Runner not online after 30s — check VPS systemctl status krexion-runner"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vps_deploy
