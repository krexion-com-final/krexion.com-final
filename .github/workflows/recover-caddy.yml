name: Recover Caddy

# 2026-02 v2 — Simpler recovery workflow. Uses only shell + docker
# commands (no embedded Python) so YAML always parses cleanly.
#
# Trigger: MANUAL ONLY. Bypasses docker compose (caddy container is
# not in the repo compose file — it's manually managed) and uses
# `docker start` / `docker logs` / `docker inspect` directly.

on:
  workflow_dispatch:

concurrency:
  group: krexion-vps-recover-caddy
  cancel-in-progress: false

jobs:
  recover-caddy:
    name: Restart krexion-caddy + diagnostics
    runs-on: [self-hosted, krexion-vps]
    timeout-minutes: 10
    steps:
      - name: Container state BEFORE
        run: |
          echo "==== docker ps -a (caddy filter) ===="
          docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' | grep -i caddy || echo "  (no caddy container)"

      - name: Container logs BEFORE (last 300 lines)
        run: |
          echo "==== docker logs krexion-caddy --tail=300 ===="
          docker logs --tail=300 krexion-caddy 2>&1 || echo "  (no logs available)"

      - name: Container inspect (raw)
        run: |
          echo "==== docker inspect krexion-caddy (raw json) ===="
          docker inspect krexion-caddy 2>&1 | head -200 || echo "  (inspect failed)"

      - name: Look for Caddyfile on host
        run: |
          echo "==== find Caddyfile ===="
          find /opt -maxdepth 5 -iname 'Caddyfile*' 2>/dev/null | head -10
          find /etc -maxdepth 3 -iname 'Caddyfile*' 2>/dev/null | head -10
          echo "-- /etc/caddy/ --"
          ls -la /etc/caddy 2>&1 | head -10
          echo "-- /opt/krexion/deployment/ --"
          ls -la /opt/krexion/deployment 2>&1 | head -20
          echo "-- /opt/krexion/caddy/ --"
          ls -la /opt/krexion/caddy 2>&1 | head -10

      - name: docker start krexion-caddy
        run: |
          echo "==== docker start krexion-caddy ===="
          docker start krexion-caddy 2>&1 || echo "  start returned non-zero"
          sleep 6
          echo ""
          echo "==== Post-start docker ps ===="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -i caddy
          echo ""
          echo "==== Post-start logs (last 100) ===="
          docker logs --tail=100 krexion-caddy 2>&1

      - name: Verify port + public endpoint
        run: |
          echo "==== ss listeners on 80/443 ===="
          ss -tlnp 2>/dev/null | grep -E ':80|:443' || echo "  (nothing listening)"
          echo ""
          echo "==== Public endpoint probe ===="
          for i in 1 2 3 4 5; do
            RESP=$(curl -sf --max-time 8 https://krexion.com/api/system/version 2>&1)
            if [ -n "$RESP" ]; then
              echo "  ✅ try $i: $RESP"
              exit 0
            fi
            echo "  ...try $i: still down"
            sleep 4
          done
          echo ""
          echo "  ⚠ public endpoint STILL not responding — review diagnostic steps above"
