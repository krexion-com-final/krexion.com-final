name: Deploy to VPS

# Triggers:
#   1. Auto — every push to main (Save to GitHub)
#   2. Manual — Actions tab → "Deploy to VPS" → Run workflow
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Sync source + rebuild containers
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the LATEST code from THIS repo on the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Rebuild the customer installer ZIP from the source folder.
      # ZIPs are gitignored, so we always rebuild here on the runner.
      - name: Rebuild Krexion-User-Package.zip
        run: |
          if [ -d "Krexion-User-Package" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq zip
            rm -f frontend/public/Krexion-User-Package.zip
            ( cd Krexion-User-Package && zip -r ../frontend/public/Krexion-User-Package.zip . -x "*.DS_Store" )
            ls -la frontend/public/Krexion-User-Package.zip
            sha256sum frontend/public/Krexion-User-Package.zip
          fi

      # Step 3: rsync ALL source code from the GitHub runner to the VPS.
      # This avoids the "VPS pulls from wrong git remote" problem entirely.
      # Excludes: .env files (protected), node_modules, __pycache__, .git
      - name: Sync source code to VPS via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.env' --exclude='node_modules' --exclude='__pycache__' --exclude='*.pyc' --exclude='.git' --exclude='build' --exclude='dist' --exclude='_backup_*' --exclude='visual_recorder_sessions' --exclude='uploads' --exclude='form_filler_screenshots' --exclude='*.zip' --exclude-from='.deployignore'
          path: ./
          remote_path: /opt/krexion/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_port: ${{ secrets.VPS_PORT || '22' }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      # Step 4: SSH into VPS to rebuild ZIP (on VPS for correct paths),
      # then force-rebuild frontend container without cache, restart.
      - name: Rebuild containers on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            cd /opt/krexion
            echo "===================================================="
            echo "  KREXION DEPLOY @ $(date)"
            echo "===================================================="

            # v1.0.11 NEW: Disk-space self-heal step.
            # Deploy #185 failed with:
            #   "no space left on device" while extracting the new
            #   docker layer to /var/lib/containerd/... -> the build
            #   succeeded on the runner but the VPS could not pull the
            #   new container image.
            # Root cause: real_user_traffic_results/ + dangling docker
            # images + container logs were eating the disk. We do a
            # bounded auto-cleanup BEFORE rebuilding so future deploys
            # self-heal without admin intervention.
            echo ">> Disk-space self-heal..."
            df -h / | tail -1
            # 1. Trim RUT screenshot results older than 7 days (keeps recent for forensics)
            if [ -d "/opt/krexion/backend/real_user_traffic_results" ]; then
              FOUND=$(find /opt/krexion/backend/real_user_traffic_results -maxdepth 1 -mindepth 1 -type d -mtime +7 2>/dev/null | wc -l)
              echo "   RUT dirs older than 7d: $FOUND"
              find /opt/krexion/backend/real_user_traffic_results -maxdepth 1 -mindepth 1 -type d -mtime +7 -exec rm -rf {} + 2>/dev/null || true
            fi
            # 2. Trim form_filler_screenshots older than 7 days
            for D in /opt/krexion/backend/form_filler_screenshots /opt/krexion/backend/visual_recorder_sessions /opt/krexion/backend/uploads; do
              if [ -d "$D" ]; then
                find "$D" -mindepth 1 -mtime +7 -delete 2>/dev/null || true
              fi
            done
            # 3. Docker housekeeping - dangling images, stopped containers, build cache
            docker container prune -f >/dev/null 2>&1 || true
            docker image prune -f >/dev/null 2>&1 || true
            docker builder prune -f --keep-storage=2GB >/dev/null 2>&1 || true
            # 4. Trim journalctl logs to last 200 MB (default can grow to GBs)
            journalctl --vacuum-size=200M >/dev/null 2>&1 || true
            echo "   After cleanup:"
            df -h / | tail -1
            echo ""

            # Re-build the installer ZIP from synced source files
            echo ">> Rebuilding installer ZIP..."
            command -v zip >/dev/null 2>&1 || (apt-get update && apt-get install -y zip)
            rm -f frontend/public/Krexion-User-Package.zip
            if [ -d "Krexion-User-Package" ]; then
              ( cd Krexion-User-Package && zip -r ../frontend/public/Krexion-User-Package.zip . -x "*.DS_Store" >/dev/null )
              SRC_SHA=$(sha256sum frontend/public/Krexion-User-Package.zip | awk '{print $1}')
              SIZE=$(stat -c%s frontend/public/Krexion-User-Package.zip)
              echo "   Built: ${SIZE} bytes, SHA256: $SRC_SHA"
            fi

            # Stop + remove old frontend container, untag old image,
            # then rebuild with NO cache (forces fresh React build).
            echo ">> Force-rebuilding frontend container..."
            docker compose stop frontend || true
            docker compose rm -f frontend || true
            docker rmi krexion-frontend 2>/dev/null || true
            docker compose build --no-cache --pull frontend
            docker compose build backend

            # Bring everything up
            echo ">> Starting containers..."
            docker compose up -d frontend backend

            # Wait for frontend to be healthy
            for i in $(seq 1 15); do
              if curl -fsS http://localhost:3000/ > /dev/null 2>&1; then
                echo "   Frontend responding (attempt $i)"
                break
              fi
              sleep 2
            done

            # Verify production matches source
            echo ">> Verifying production..."
            sleep 5
            PROD_SHA=$(curl -sL "https://krexion.com/Krexion-User-Package.zip?nocache=$(date +%s)" | sha256sum | awk '{print $1}')
            echo "   Source SHA:     $SRC_SHA"
            echo "   Production SHA: $PROD_SHA"
            if [ "$SRC_SHA" = "$PROD_SHA" ]; then
              echo "   ✓ MATCH — new installer is live"
            else
              echo "::warning::ZIP mismatch — Caddy proxy may be caching. Restarting Caddy..."
              docker compose restart caddy || true
              sleep 5
              PROD_SHA=$(curl -sL "https://krexion.com/Krexion-User-Package.zip?nocache=$(date +%s)" | sha256sum | awk '{print $1}')
              if [ "$SRC_SHA" != "$PROD_SHA" ]; then
                echo "::error::ZIP still mismatched. Check Caddy or CDN."
                exit 1
              fi
              echo "   ✓ MATCH (after Caddy restart)"
            fi

            # Final status
            docker compose ps
            echo "===================================================="
            echo "  DEPLOY COMPLETE @ $(date)"
            echo "===================================================="
