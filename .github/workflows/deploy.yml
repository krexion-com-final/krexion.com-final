name: Deploy to VPS

# 2026-01-09 v2.4.2 — REWRITTEN to use the permanent self-hosted
# GitHub Actions runner installed at /opt/krexion-runner on the
# customer VPS.  Consumes ZERO GitHub Actions minutes so this
# workflow succeeds even when the org quota is exhausted.
#
# Triggers:
#   1. Auto — every push to main
#   2. Manual — Actions tab → "Deploy to VPS" → Run workflow
#
# What it does (all locally on the VPS itself since the runner IS
# the VPS):
#   1. Check out the latest code into the runner's workspace
#   2. Rebuild Krexion-User-Package.zip
#   3. rsync workspace → /opt/krexion/ (excludes .env / caches / builds)
#   4. Disk-space self-heal (removes stale caches + dangling docker
#      images so a full rebuild always has room)
#   5. docker compose build --no-cache backend frontend
#   6. docker compose up -d backend frontend
#   7. Health check + version report

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time — new pushes cancel any in-flight run.
concurrency:
  group: krexion-vps-deploy
  cancel-in-progress: false  # let in-flight deploys finish so we don't
                             # break a mid-container-rebuild step

jobs:
  deploy:
    name: Sync source + rebuild containers
    runs-on: [self-hosted, krexion-vps]
    # 45 min hard cap — full no-cache build for backend + frontend on
    # the VPS typically finishes in 8-12 min but installers with a
    # cold docker cache can take ~30 min.
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild Krexion-User-Package.zip
        run: |
          if [ -d "Krexion-User-Package" ]; then
            command -v zip >/dev/null || (apt-get update -qq && apt-get install -y -qq zip)
            rm -f frontend/public/Krexion-User-Package.zip
            ( cd Krexion-User-Package && zip -r ../frontend/public/Krexion-User-Package.zip . -x "*.DS_Store" )
            ls -la frontend/public/Krexion-User-Package.zip
            sha256sum frontend/public/Krexion-User-Package.zip
          fi

      - name: rsync workspace → /opt/krexion/ (local, no SSH)
        run: |
          command -v rsync >/dev/null || (apt-get update -qq && apt-get install -y -qq rsync)
          rsync -avzr --delete \
            --exclude='.env' --exclude='node_modules' --exclude='__pycache__' \
            --exclude='*.pyc' --exclude='.git' --exclude='build' --exclude='dist' \
            --exclude='_backup_*' --exclude='visual_recorder_sessions' \
            --exclude='uploads' --exclude='form_filler_screenshots' \
            --exclude='*.zip' --exclude='downloads' \
            --exclude-from='.deployignore' \
            ./ /opt/krexion/
          echo "→ Source synced to /opt/krexion/"

      - name: Disk-space self-heal
        run: |
          echo ">> Disk BEFORE cleanup"
          df -h / /var/lib/docker 2>/dev/null | head -5
          # Remove stale caches + dangling docker artifacts (bounded)
          rm -rf /opt/krexion/backend/real_user_traffic_results/*.mp4 2>/dev/null || true
          rm -rf /opt/krexion/backend/form_filler_screenshots/* 2>/dev/null || true
          rm -rf /opt/krexion/backend/visual_recorder_sessions/*/screenshots 2>/dev/null || true
          docker image prune -f 2>&1 | tail -2 || true
          docker builder prune -f 2>&1 | tail -2 || true
          echo ">> Disk AFTER cleanup"
          df -h / /var/lib/docker 2>/dev/null | head -5

      - name: Detect compose file
        id: compose
        run: |
          cd /opt/krexion
          for f in docker-compose.prod.yml docker-compose.production.yml docker-compose.yml compose.yml; do
            if [ -f "$f" ]; then
              echo "compose_file=$f" >> $GITHUB_OUTPUT
              echo "→ Using $f"
              exit 0
            fi
          done
          echo "ERROR: no docker-compose file found in /opt/krexion"
          ls -la
          exit 1

      - name: Docker build --no-cache (backend + frontend)
        env:
          COMPOSE_FILE: ${{ steps.compose.outputs.compose_file }}
        run: |
          cd /opt/krexion
          echo ">> Building backend + frontend with --no-cache..."
          docker compose -f "$COMPOSE_FILE" build --no-cache backend frontend

      - name: Docker up
        env:
          COMPOSE_FILE: ${{ steps.compose.outputs.compose_file }}
        run: |
          cd /opt/krexion
          docker compose -f "$COMPOSE_FILE" up -d backend frontend
          echo ">> Containers started"

      - name: Health check + version report
        env:
          COMPOSE_FILE: ${{ steps.compose.outputs.compose_file }}
        run: |
          cd /opt/krexion
          echo ">> Waiting up to 60s for backend health..."
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf --max-time 3 http://localhost:8001/api/system/version >/dev/null 2>&1; then
              CUR=$(curl -s http://localhost:8001/api/system/version | python3 -c "import sys,json;print(json.load(sys.stdin).get('version','?'))" 2>/dev/null || echo "?")
              echo "  ✅ Backend up · version=$CUR"
              break
            fi
            echo "  ...still starting (attempt $i/12)"
          done
          echo ""
          echo "===================================================="
          echo "  Container status:"
          docker compose -f "$COMPOSE_FILE" ps
          echo "===================================================="
          echo "  Backend VERSION file: $(cat backend/VERSION 2>/dev/null || echo '?')"
          echo "  Public endpoint check:"
          curl -sf --max-time 5 https://krexion.com/api/system/version || echo "(public endpoint check failed — check nginx/cloudflare)"
          echo "===================================================="
          echo "  Deploy complete: $(date -u +%FT%TZ)"
          echo "===================================================="
