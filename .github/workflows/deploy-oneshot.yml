name: Deploy to VPS (one-shot self-hosted)

# 2026-01-09 v2.4.2 — Temporary workflow used ONE TIME to unblock the
# v2.4.2 deploy while the org's GitHub-hosted Actions quota was
# exhausted. Runs on a self-hosted Linux ARM64 runner registered
# from the Emergent sandbox. Delete after the deploy completes.
#
# Uses the SAME secrets (VPS_HOST, VPS_USER, VPS_PORT, VPS_SSH_KEY)
# as the main deploy.yml so behavior is identical.
#
# Triggered manually via workflow_dispatch — no push trigger so
# subsequent pushes don't accidentally hit this file.

on:
  workflow_dispatch:

jobs:
  deploy:
    name: rsync + docker rebuild (self-hosted)
    runs-on: [self-hosted, Linux, ARM64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild Krexion-User-Package.zip
        run: |
          if [ -d "Krexion-User-Package" ]; then
            which zip || (apt-get update -qq && apt-get install -y -qq zip)
            rm -f frontend/public/Krexion-User-Package.zip
            ( cd Krexion-User-Package && zip -r ../frontend/public/Krexion-User-Package.zip . -x "*.DS_Store" )
            ls -la frontend/public/Krexion-User-Package.zip
            sha256sum frontend/public/Krexion-User-Package.zip
          fi

      - name: Install rsync + ssh on runner if missing
        run: |
          which rsync || (apt-get update -qq && apt-get install -y -qq rsync)
          which ssh   || (apt-get update -qq && apt-get install -y -qq openssh-client)
          rsync --version | head -1
          ssh -V

      - name: Configure SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_deploy
          chmod 600 ~/.ssh/vps_deploy
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: rsync source to VPS
        run: |
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/vps_deploy -p ${{ secrets.VPS_PORT || 22 }} -o StrictHostKeyChecking=accept-new" \
            --exclude='.env' --exclude='node_modules' --exclude='__pycache__' \
            --exclude='*.pyc' --exclude='.git' --exclude='build' --exclude='dist' \
            --exclude='_backup_*' --exclude='visual_recorder_sessions' \
            --exclude='uploads' --exclude='form_filler_screenshots' \
            --exclude='*.zip' --exclude='downloads' \
            --exclude-from='.deployignore' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/krexion/

      - name: Rebuild containers on VPS
        run: |
          ssh -i ~/.ssh/vps_deploy -p ${{ secrets.VPS_PORT || 22 }} \
              -o StrictHostKeyChecking=accept-new \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'bash -s' << 'ENDSSH'
          set -e
          cd /opt/krexion
          echo "==============================================="
          echo "  Krexion VPS deploy — v2.4.2 (one-shot)"
          echo "  Started: $(date -u +%FT%TZ)"
          echo "==============================================="

          # Rebuild the customer installer zip on the VPS side too
          if [ -d "Krexion-User-Package" ]; then
            which zip >/dev/null || (apt-get update -qq && apt-get install -y -qq zip)
            rm -f frontend/public/Krexion-User-Package.zip
            ( cd Krexion-User-Package && zip -r ../frontend/public/Krexion-User-Package.zip . -x "*.DS_Store" )
            ls -la frontend/public/Krexion-User-Package.zip
          fi

          # Docker compose file detection — use the first one that exists
          COMPOSE=""
          for f in docker-compose.prod.yml docker-compose.production.yml docker-compose.yml compose.yml; do
            if [ -f "$f" ]; then COMPOSE="$f"; break; fi
          done
          if [ -z "$COMPOSE" ]; then
            echo "ERROR: no docker-compose file found in /opt/krexion"
            ls -la
            exit 1
          fi
          echo "Using compose file: $COMPOSE"

          # Rebuild backend + frontend without cache so v2.4.2 code is baked in
          docker compose -f "$COMPOSE" build --no-cache backend frontend
          docker compose -f "$COMPOSE" up -d backend frontend

          # Health check — wait up to 60s for backend to come up
          echo "Waiting for backend health..."
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf --max-time 3 http://localhost:8001/api/system/version >/dev/null 2>&1; then
              CUR=$(curl -s http://localhost:8001/api/system/version | python3 -c "import sys,json;print(json.load(sys.stdin).get('version','?'))" 2>/dev/null || echo "?")
              echo "  ✓ Backend up · version=$CUR"
              break
            fi
            echo "  ...still starting (attempt $i/12)"
          done

          # Final report
          echo ""
          echo "==============================================="
          echo "  Container status:"
          docker compose -f "$COMPOSE" ps
          echo "==============================================="
          echo "  Backend VERSION file:"
          cat backend/VERSION 2>/dev/null || echo "(not readable)"
          echo "==============================================="
          echo "  Deploy complete: $(date -u +%FT%TZ)"
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vps_deploy
