name: Build Krexion Desktop (Electron)

# ────────────────────────────────────────────────────────────────────────────
# Parallel Electron build pipeline. Completely independent of the existing
# Inno-Setup workflow (`build-windows-release.yml`). Produces:
#
#     Krexion-Desktop-Setup-<version>.exe
#
# which does NOT collide with the classic `Krexion-Setup-<version>.exe`.
# ────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag (e.g. desktop-v2.1.8). Empty = artifact only, no GH Release.'
        required: false
        default: ''
  # 2026-02 v2.1.32: mirror the Windows-native auto-trigger. Whenever
  # backend/VERSION bumps, the Electron desktop build also fires
  # automatically — so the customer's auto-update channel
  # (latest.yml on https://krexion.com/downloads/desktop/) gets the
  # new version on the same push, not 24h later via a manual dispatch.
  push:
    branches: [main]
    paths:
      - 'backend/VERSION'

permissions:
  contents: write

concurrency:
  group: krexion-electron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Electron installer (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn (Corepack)
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute version
        id: version
        shell: bash
        run: |
          v=$(tr -d '[:space:]' < backend/VERSION)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building Krexion Desktop v$v"

      - name: Sync package.json version
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          $pkgPath = "electron-desktop/package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $pkg.version = $v
          ($pkg | ConvertTo-Json -Depth 50) | Set-Content $pkgPath -Encoding UTF8

      - name: Cache resource downloads
        uses: actions/cache@v4
        with:
          path: electron-desktop/.cache
          key: krexion-desktop-cache-py3.11.9-mongo7.0.14-v1

      - name: Install Electron deps
        working-directory: electron-desktop
        run: yarn install --network-timeout 600000

      - name: Prepare resources (Python + MongoDB + frontend + backend)
        working-directory: electron-desktop
        run: yarn prepare-resources

      # ────────────────────────────────────────────────────────────
      # 2026-02 — Pre-cache the NSIS binaries from
      # github.com/electron-userland/electron-builder-binaries before
      # the actual electron-builder run. GitHub's release CDN keeps
      # returning HTTP 504 on these (twice in a row killed v2.1.27
      # builds). By downloading them ourselves with curl --retry into
      # the same %LOCALAPPDATA%\electron-builder\Cache\... directory
      # that electron-builder reads, we avoid the in-builder fetch
      # entirely — and even if curl fails, we retry the actual
      # electron-builder step up to 3 times below.
      # ────────────────────────────────────────────────────────────
      - name: Pre-cache NSIS binaries (work around GitHub 504s)
        shell: pwsh
        run: |
          $cacheRoot = "$env:LOCALAPPDATA\electron-builder\Cache"
          $nsisDir   = "$cacheRoot\nsis\nsis-3.0.4.1"
          $resDir    = "$cacheRoot\nsis\nsis-resources-3.4.1"
          New-Item -ItemType Directory -Force -Path $nsisDir | Out-Null
          New-Item -ItemType Directory -Force -Path $resDir  | Out-Null

          function Fetch($url, $out) {
            for ($i = 1; $i -le 5; $i++) {
              try {
                Write-Host "Attempt $i → $url"
                Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing -TimeoutSec 120 -ErrorAction Stop
                Write-Host "  ✓ downloaded ($([math]::Round((Get-Item $out).Length/1MB,1)) MB)"
                return $true
              } catch {
                Write-Host "  ✗ attempt $i failed: $($_.Exception.Message)"
                Start-Sleep -Seconds (5 * $i)
              }
            }
            return $false
          }

          $tmp1 = "$env:RUNNER_TEMP\nsis-3.0.4.1.7z"
          $tmp2 = "$env:RUNNER_TEMP\nsis-resources-3.4.1.7z"
          $ok1 = Fetch "https://github.com/electron-userland/electron-builder-binaries/releases/download/nsis-3.0.4.1/nsis-3.0.4.1.7z" $tmp1
          $ok2 = Fetch "https://github.com/electron-userland/electron-builder-binaries/releases/download/nsis-resources-3.4.1/nsis-resources-3.4.1.7z" $tmp2

          if ($ok1) {
            7z x $tmp1 "-o$nsisDir" -y | Out-Null
            Write-Host "Extracted NSIS → $nsisDir"
          }
          if ($ok2) {
            7z x $tmp2 "-o$resDir" -y | Out-Null
            Write-Host "Extracted NSIS-resources → $resDir"
          }
          # Don't fail the job if pre-cache fails — the retry step below
          # is still our safety net.

      - name: Build NSIS installer (with retry — GitHub CDN sometimes 504s)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 90
          shell: bash
          command: |
            cd electron-desktop
            npx electron-builder --win --x64 --publish never

      - name: List dist artifacts (debug)
        working-directory: electron-desktop
        shell: bash
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== latest.yml (auto-update manifest) ==="
          if [ -f dist/latest.yml ]; then
            cat dist/latest.yml
          else
            echo "::error::dist/latest.yml NOT produced — auto-update will not work"
            exit 1
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        # 2026-01: GitHub free-tier accounts hit the 500 MB artifact
        # quota fast. We mark this upload as continue-on-error so the
        # subsequent "Create GitHub Release" step still runs — GitHub
        # Releases do NOT count against the artifact quota and that's
        # what electron-updater actually polls for customer auto-update.
        continue-on-error: true
        with:
          name: Krexion-Desktop-Setup-${{ steps.version.outputs.version }}
          # Upload BOTH the installer .exe AND the latest.yml manifest.
          # latest.yml is what electron-updater (inside the installed
          # customer app) reads to detect new versions.
          path: |
            electron-desktop/dist/Krexion-Desktop-Setup-*.exe
            electron-desktop/dist/Krexion-Desktop-Setup-*.exe.blockmap
            electron-desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 3

      - name: Create GitHub Release (when release_tag provided OR on VERSION push)
        # 2026-02 v2.1.32: also publish a release on push-triggered builds
        # (auto-tag = v<VERSION>). Without this the latest.yml auto-update
        # channel never gets the new build because Electron Desktop only
        # picks up updates from a real GH Release attaching latest.yml.
        if: ${{ inputs.release_tag != '' || github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag != '' && inputs.release_tag || format('desktop-v{0}', steps.version.outputs.version) }}
          name: Krexion Desktop ${{ steps.version.outputs.version }}
          body: |
            Krexion Desktop — fully-local edition (auto-update enabled).

            • Local MongoDB on 127.0.0.1:27117
            • Local FastAPI backend on 127.0.0.1:8088
            • React dashboard packaged inside Electron
            • Heavy workload data never leaves the PC.
            • **Auto-update**: installed clients running this version or
              newer will silently detect future releases and prompt to
              install on next launch.

            This is the parallel Electron build. The classic Inno-Setup
            installer (`Krexion-Setup-<version>.exe`) is unaffected.
          # IMPORTANT: latest.yml MUST be uploaded alongside the .exe for
          # electron-updater to detect this release. The .blockmap file
          # enables delta updates (smaller downloads for incremental
          # updates), which electron-updater also looks for automatically.
          files: |
            electron-desktop/dist/Krexion-Desktop-Setup-*.exe
            electron-desktop/dist/Krexion-Desktop-Setup-*.exe.blockmap
            electron-desktop/dist/latest.yml
          draft: false
          prerelease: false

  # ─────────────────────────────────────────────────────────────────
  # 2026-02 — SELF-HOSTED MIRROR on the production VPS.
  #
  # MUST run in a SEPARATE Linux job because appleboy/scp-action is a
  # Docker container action and Docker container actions only run on
  # Linux runners (fix for: "Container action is only supported on
  # Linux" — that error blew up when we tried to SCP straight from the
  # Windows build runner).
  #
  # Approach: build job uploads installer + latest.yml as a GitHub
  # Actions artifact → this job downloads it on Ubuntu → SCPs to VPS.
  # Required secrets (same as deploy.yml):
  #   VPS_HOST, VPS_USER, VPS_PORT (optional), VPS_SSH_KEY
  # ─────────────────────────────────────────────────────────────────
  mirror-to-vps:
    name: Mirror to krexion.com VPS (self-hosted CDN)
    needs: build
    runs-on: ubuntu-latest
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Download installer artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: Krexion-Desktop-Setup-${{ needs.build.outputs.version }}
          path: dist

      - name: List downloaded artifacts (debug)
        run: ls -lah dist/

      - name: SCP installer + latest.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist/Krexion-Desktop-Setup-*.exe,dist/Krexion-Desktop-Setup-*.exe.blockmap,dist/latest.yml"
          target: "/opt/krexion/downloads/desktop/"
          strip_components: 1
          overwrite: true

      - name: Update "latest" copy + permissions on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 5m
          script: |
            set -e
            mkdir -p /opt/krexion/downloads/desktop
            cd /opt/krexion/downloads/desktop
            V="${{ needs.build.outputs.version }}"
            # Stable filename so the public homepage button can point to
            # a single URL forever ("Krexion-Desktop-Setup-latest.exe").
            # We hard-copy (cp -f) instead of symlink because the nginx
            # docker volume mount serves files; copies behave identically
            # across filesystems and work without follow-symlinks tweaks.
            if [ -f "Krexion-Desktop-Setup-${V}.exe" ]; then
              cp -f "Krexion-Desktop-Setup-${V}.exe" "Krexion-Desktop-Setup-latest.exe"
            else
              echo "::warning::Expected Krexion-Desktop-Setup-${V}.exe but not found — picking newest .exe instead"
              NEWEST=$(ls -t Krexion-Desktop-Setup-*.exe 2>/dev/null | grep -v latest | head -1)
              [ -n "$NEWEST" ] && cp -f "$NEWEST" "Krexion-Desktop-Setup-latest.exe" || true
            fi
            ls -la
            chmod -R a+r .
            echo "Self-hosted CDN updated:"
            echo "  https://krexion.com/downloads/desktop/Krexion-Desktop-Setup-latest.exe"
            echo "  https://krexion.com/downloads/desktop/latest.yml"
