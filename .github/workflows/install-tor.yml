name: One-off — Install Tor on VPS

# Manual-trigger workflow that installs + enables Tor SOCKS5 on the
# production VPS so Krexion's Multi-Hop Proxy Chain (Step 3) can use
# 127.0.0.1:9050 as the first hop. Run ONCE; delete this file afterwards.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm installing Tor on the VPS'
        required: true
        default: 'no'

jobs:
  install-tor:
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Install Tor on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -euo pipefail
            echo "=== Krexion Tor install (one-off) ==="
            echo "[1/5] OS info"
            cat /etc/os-release | head -3
            echo
            echo "[2/5] apt-get update"
            sudo apt-get update -qq
            echo
            echo "[3/5] apt-get install tor"
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tor
            echo
            echo "[4/5] Enable + start tor systemd service"
            sudo systemctl enable --now tor
            sleep 3
            sudo systemctl status tor --no-pager | head -20 || true
            echo
            echo "[5/5] Verify SOCKS5 listening on 127.0.0.1:9050"
            if ss -tlnp 2>/dev/null | grep -E "127\.0\.0\.1:9050" > /dev/null; then
              echo "  ✅ Tor SOCKS5 LISTENING on 127.0.0.1:9050"
            else
              echo "  ❌ Tor SOCKS5 NOT listening — check /etc/tor/torrc"
              ss -tlnp 2>/dev/null | grep -i tor || true
              exit 1
            fi
            echo
            echo "[bonus] Quick sanity probe — fetch IP via Tor"
            if command -v curl >/dev/null 2>&1; then
              EXIT_IP=$(timeout 30 curl --socks5-hostname 127.0.0.1:9050 -sS https://api.ipify.org 2>&1 || echo "TOR_PROBE_FAILED")
              echo "  Tor exit IP: $EXIT_IP"
            fi
            echo
            echo "✅ Tor install + activation COMPLETE"
            echo "Krexion can now use Multi-Hop Proxy Chain with Tor first-hop."

      - name: Hint Krexion backend to pick up Tor (optional restart)
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: false
          command_timeout: 2m
          script: |
            # No restart strictly needed — proxy_chain.py probes Tor on
            # every visit. But health-check capabilities endpoint caches
            # tor_available=false in some browsers' state. A backend
            # bounce makes the UI badge flip to "Tor LIVE" instantly.
            cd /root/krexion 2>/dev/null || cd /opt/krexion 2>/dev/null || cd ~/krexion 2>/dev/null || true
            if [ -f docker-compose.yml ] || [ -f docker-compose.beast.yml ]; then
              docker compose restart backend 2>/dev/null || \
                docker compose -f docker-compose.beast.yml restart backend 2>/dev/null || \
                echo "(skipping backend restart — could not locate compose file)"
            fi
            echo "Done."
