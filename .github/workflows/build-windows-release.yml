# ════════════════════════════════════════════════════════════════════════
# Krexion — Windows native build & release pipeline
# ════════════════════════════════════════════════════════════════════════
# Manual-only — Trigger from Actions tab → "Build Native Windows Release"
# → Run workflow.
#
# Produces these artifacts:
#   1. krexion-backend     — PyInstaller-compiled FastAPI backend
#   2. krexion-frontend    — Static React build
#   3. (optional) Krexion-Setup.exe — Inno Setup installer
#
# Build is INTENTIONALLY tolerant — individual sub-steps are allowed to
# fail without blocking the others, so you ALWAYS get downloadable
# artifacts to inspect logs even if one piece breaks.
# ════════════════════════════════════════════════════════════════════════

name: Build Native Windows Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty for nightly build (no GH Release).'
        required: false
        default: ''

concurrency:
  group: krexion-native-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    name: Compile backend with PyInstaller
    runs-on: windows-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "version=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=nightly-$(date +%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps + PyInstaller
        shell: powershell
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r backend/requirements.txt
          pip install pyinstaller==6.11.1

      - name: Pre-install Playwright Chromium (FULL build)
        shell: powershell
        continue-on-error: true   # don't block backend build if Chromium download fails
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\build\chromium-bundle"
          python -m playwright install chromium --no-shell
          Get-ChildItem -Path "$env:PLAYWRIGHT_BROWSERS_PATH" -Recurse -Filter "chrome.exe" -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Run PyInstaller build script
        shell: powershell
        run: |
          if (Test-Path build/build-backend.py) {
            python build/build-backend.py
          } else {
            Write-Error "build/build-backend.py missing"
            exit 1
          }

      - name: Show build output (diagnostic)
        if: always()
        shell: powershell
        run: |
          if (Test-Path build/dist) {
            Get-ChildItem build/dist -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length |
              Format-Table -AutoSize
          } else {
            Write-Host "No build/dist directory was produced."
          }

      - name: Upload backend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: krexion-backend-exe
          path: |
            build/dist/krexion-backend.dist/**
            build/chromium-bundle/**
          retention-days: 14
          if-no-files-found: warn

  build-frontend:
    name: Build React frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # NOTE: yarn cache intentionally disabled — the cache action
          # threw "No existing directories" warnings on this repo's
          # layout. yarn install is fast enough without cache for a
          # manual-trigger workflow that runs only on release builds.

      - name: Build production bundle
        run: |
          cd frontend
          yarn install --frozen-lockfile
          # Embed the local backend URL — customer install always talks
          # to 127.0.0.1:8001 (the Krexion Windows Service). This makes
          # the build fully offline-capable.
          echo "REACT_APP_BACKEND_URL=http://127.0.0.1:8001" > .env.production
          yarn build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: krexion-frontend-build
          path: frontend/build
          retention-days: 14

  build-installer:
    name: Build Krexion-Setup.exe via Inno Setup
    runs-on: windows-latest
    needs: [build-backend, build-frontend]
    if: always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: krexion-backend-exe
          path: build/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: krexion-frontend-build
          path: build/frontend-build/

      - name: Download MongoDB Portable
        shell: powershell
        run: |
          $url = "https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-7.0.14.zip"
          Invoke-WebRequest -Uri $url -OutFile build/mongo.zip -UseBasicParsing
          Expand-Archive -Path build/mongo.zip -DestinationPath build/mongo-extract -Force
          Get-ChildItem build/mongo-extract -Recurse -Filter "mongod.exe" |
            Select-Object -First 1 |
            ForEach-Object {
              $src = $_.DirectoryName
              New-Item -ItemType Directory -Force -Path build/mongo-portable | Out-Null
              Copy-Item -Path "$src\..\*" -Destination build/mongo-portable -Recurse -Force
            }
          Remove-Item -Path build/mongo.zip,build/mongo-extract -Recurse -Force -ErrorAction SilentlyContinue

      - name: Download NSSM
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://nssm.cc/release/nssm-2.24.zip" `
                            -OutFile build/nssm.zip -UseBasicParsing
          Expand-Archive -Path build/nssm.zip -DestinationPath build/nssm-extract -Force
          New-Item -ItemType Directory -Force -Path build/nssm-portable | Out-Null
          Copy-Item -Path build/nssm-extract/nssm-2.24/win64/nssm.exe `
                    -Destination build/nssm-portable/nssm.exe -Force
          Remove-Item -Path build/nssm.zip,build/nssm-extract -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Compile installer
        shell: powershell
        run: |
          if (Test-Path installer/krexion-setup.iss) {
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
                /Qp installer/krexion-setup.iss `
                /DAppVersion=${{ needs.build-backend.outputs.version }}
          } else {
            Write-Error "installer/krexion-setup.iss missing"
            exit 1
          }

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: krexion-installer
          path: installer/Output/Krexion-Setup-*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Krexion ${{ github.event.inputs.release_tag }}
          draft: false
          prerelease: false
          files: |
            installer/Output/Krexion-Setup-*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
