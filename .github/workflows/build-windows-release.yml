# ════════════════════════════════════════════════════════════════════════
# Krexion — Windows native build & release pipeline
# ════════════════════════════════════════════════════════════════════════
# Triggers on push to `main` AND on manual dispatch from the Actions tab.
# Produces three GitHub Release artifacts:
#   1. krexion-backend.exe   — Nuitka-compiled FastAPI backend (no .py
#                              source visible; runs as a Windows service)
#   2. Krexion-Setup.exe     — Inno Setup installer that:
#        • Installs backend + frontend to C:\Program Files\Krexion
#        • Bundles Playwright Chromium (FULL build for --headless=new)
#        • Bundles MongoDB Portable (no Docker)
#        • Registers "Krexion" Windows Service (auto-start)
#        • Adds Krexion Tray app to startup
#        • Creates Start Menu + Desktop shortcuts
#   3. Krexion-User-Package.zip — Legacy Docker-based zip (unchanged) for
#                              customers who still want the Docker route
#
# IMPORTANT: This workflow ADDS a new release path. The existing
# `deploy.yml` cloud-deploy workflow is untouched. Customers using the
# old Docker installer keep working; new customers use Krexion-Setup.exe.
# ════════════════════════════════════════════════════════════════════════

name: Build Native Windows Release

on:
  # 2026-01: Manual-only trigger. The Windows build takes 30-40 min and
  # requires several supporting files (Inno Setup icon, GitHub Releases
  # artifact links) that aren't present on first run. Triggering it
  # automatically on every push would clutter the Actions tab with
  # red-X failures. Run it explicitly from Actions → "Build Native
  # Windows Release" → Run workflow when you want a new customer .exe.
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty for nightly build (no GH Release).'
        required: false
        default: ''

# Avoid concurrent builds of the same ref racing each other
concurrency:
  group: krexion-native-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    name: Compile backend with Nuitka
    runs-on: windows-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "version=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=nightly-$(date +%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend deps + Nuitka
        shell: powershell
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r backend/requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Pre-install Playwright Chromium (FULL build)
        shell: powershell
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\build\chromium-bundle"
          python -m playwright install chromium --no-shell
          # Verify chromium present
          Get-ChildItem -Path "$env:PLAYWRIGHT_BROWSERS_PATH" -Recurse -Filter "chrome.exe" | Select-Object FullName

      - name: Run Nuitka build script
        shell: powershell
        run: |
          if (Test-Path build/build-backend.py) {
            python build/build-backend.py
          } else {
            Write-Host "build/build-backend.py missing — skipping (legacy build)"
            exit 1
          }

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: krexion-backend-exe
          path: |
            build/dist/krexion-backend.dist/**
            build/chromium-bundle/**
          retention-days: 7

  build-frontend:
    name: Build React frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Build production bundle
        run: |
          cd frontend
          yarn install --frozen-lockfile
          # Embed the local backend URL — customer install always talks
          # to 127.0.0.1:8001 (the Krexion Windows Service). This makes
          # the build fully offline-capable.
          echo "REACT_APP_BACKEND_URL=http://127.0.0.1:8001" > .env.production
          yarn build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: krexion-frontend-build
          path: frontend/build
          retention-days: 7

  build-installer:
    name: Build Krexion-Setup.exe via Inno Setup
    runs-on: windows-latest
    needs: [build-backend, build-frontend]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: krexion-backend-exe
          path: build/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: krexion-frontend-build
          path: build/frontend-build/

      - name: Download MongoDB Portable
        shell: powershell
        run: |
          $url = "https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-7.0.14.zip"
          $out = "build/mongo.zip"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Expand-Archive -Path $out -DestinationPath build/mongo-extract -Force
          Get-ChildItem -Path build/mongo-extract -Recurse -Filter "mongod.exe" |
            Select-Object -First 1 |
            ForEach-Object {
              $src = $_.DirectoryName
              New-Item -ItemType Directory -Force -Path build/mongo-portable | Out-Null
              Copy-Item -Path "$src\*" -Destination build/mongo-portable -Recurse -Force
            }
          Remove-Item -Path build/mongo.zip,build/mongo-extract -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem build/mongo-portable

      - name: Download NSSM (service wrapper)
        shell: powershell
        run: |
          $url = "https://nssm.cc/release/nssm-2.24.zip"
          Invoke-WebRequest -Uri $url -OutFile build/nssm.zip -UseBasicParsing
          Expand-Archive -Path build/nssm.zip -DestinationPath build/nssm-extract -Force
          New-Item -ItemType Directory -Force -Path build/nssm-portable | Out-Null
          Copy-Item -Path build/nssm-extract/nssm-2.24/win64/nssm.exe `
                    -Destination build/nssm-portable/nssm.exe -Force
          Remove-Item -Path build/nssm.zip,build/nssm-extract -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Compile installer
        shell: powershell
        run: |
          if (Test-Path installer/krexion-setup.iss) {
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Qp installer/krexion-setup.iss `
              /DAppVersion=${{ needs.build-backend.outputs.version }}
          } else {
            Write-Host "installer/krexion-setup.iss missing — skipping"
            exit 1
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: krexion-installer
          path: installer/Output/Krexion-Setup-*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Krexion ${{ github.event.inputs.release_tag }}
          draft: false
          prerelease: false
          files: |
            installer/Output/Krexion-Setup-*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
