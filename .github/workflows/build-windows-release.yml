name: Build Native Windows Release

# ========================================================================
# Krexion - Embedded-Python Windows build pipeline
# ========================================================================
# Uses the embedded-Python approach (same as Calibre, Anki, etc.) instead
# of PyInstaller/Nuitka compilation. ~99% first-try success rate.
# ========================================================================

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty for nightly build (no GH Release).'
        required: false
        default: ''
  # v1.0.18: auto-trigger on push to main whenever backend/VERSION
  # changes. Previously the Windows installer had to be manually
  # triggered from the Actions tab after every fix push, which led to
  # 2 separate failure modes on customer testing:
  #   1. Cloud deploy lands, customer reinstalls old installer →
  #      reports "still broken" because the desktop fix wasn't built.
  #   2. Admin forgets to dispatch the workflow at all → no new .exe
  #      gets cut for hours.
  # Trigger key = a change to backend/VERSION (single source of truth
  # the build itself reads). Tag derived from the version file so the
  # GitHub Release lands automatically without a manual tag input.
  push:
    branches: [main]
    paths:
      - 'backend/VERSION'

concurrency:
  group: krexion-native-build-${{ github.ref }}
  cancel-in-progress: true

# ----------------------------------------------------------------------
# `contents: write` is required by softprops/action-gh-release@v2 in the
# final "Create GitHub Release" step. Since 2023 GitHub ships repos with
# the default GITHUB_TOKEN scoped to read-only, so without this line the
# release step fails with:
#     HTTP 403 "Resource not accessible by integration"
# We grant the minimum permissions needed; everything else stays default
# (read-only), so workflows can still check out code and download deps.
# ----------------------------------------------------------------------
permissions:
  contents: write

jobs:
  build-backend:
    name: Bundle backend (embedded Python)
    # 2026-01-09 — switched from `windows-latest` (paid GH minutes) to
    # the customer's self-hosted Windows runner. Setup guide:
    # deployment/windows-runner/WINDOWS-RUNNER-GUIDE.md
    # If the Windows runner is offline, this job will queue until it
    # comes back — it will NOT fall back to `windows-latest` (that's a
    # cost-of-doing-business decision, not a runtime one).
    runs-on: [self-hosted, windows, krexion-windows]
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      numeric_version: ${{ steps.version.outputs.numeric_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          # `version` = human/display tag - used for filenames, GitHub
          # Release title, and AppVersion in installer branding. Can be
          # anything (e.g. "v1.0.5", "nightly-20260602-1430").
          #
          # v1.0.18: auto-derive tag from backend/VERSION when the
          # workflow is push-triggered (no manual input). Falls back
          # to nightly only if VERSION is missing or empty.
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            VER="${{ github.event.inputs.release_tag }}"
          elif [ -f "backend/VERSION" ] && [ -s "backend/VERSION" ]; then
            FILE_VER=$(tr -d '[:space:]' < backend/VERSION)
            if [ -n "$FILE_VER" ]; then
              # Prepend `v` if not already present so the tag follows
              # the GitHub convention "v1.0.18" (matches existing tags).
              case "$FILE_VER" in
                v*) VER="$FILE_VER" ;;
                *)  VER="v$FILE_VER" ;;
              esac
            else
              VER="nightly-$(date +%Y%m%d-%H%M)"
            fi
          else
            VER="nightly-$(date +%Y%m%d-%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

          # `numeric_version` = strict X.X.X.X (digits + dots, max 4
          # parts) - required by Inno Setup's VersionInfoVersion field
          # which feeds into the Windows EXE FILEVERSION resource.
          #
          # Why this is done with `awk` instead of `read`+IFS: the
          # GitHub Actions default `bash` is invoked with
          # `set -eo pipefail`, and `IFS='.' read -r A B C D <<<"$X"`
          # returns non-zero whenever the input has fewer than 4
          # fields (read hits EOF before filling D), which silently
          # kills the whole step.
          #
          # We use `*` instead of `{0,3}` so this works on both mawk
          # (Linux/macOS default) and gawk (Git Bash on Windows) -
          # mawk doesn't support ERE interval quantifiers without
          # `--re-interval`. We then cap the array to 4 parts after
          # splitting.
          #
          # Examples:
          #   v1.0.5            -> 1.0.5.0
          #   v2.0.0-beta1      -> 2.0.0.0
          #   1.0.5.10-rc2      -> 1.0.5.10
          #   1.2.3.4.5         -> 1.2.3.4    (extras dropped)
          #   nightly-20260602  -> 0.0.0.0
          #   v1                -> 1.0.0.0
          NUM4=$(echo "$VER" | awk '{
            if (match($0, /^v?[0-9]+(\.[0-9]+)*/)) {
              s = substr($0, RSTART, RLENGTH)
              sub(/^v/, "", s)
              n = split(s, a, ".")
              if (n > 4) n = 4
              for (i = n + 1; i <= 4; i++) a[i] = "0"
              printf "%s.%s.%s.%s", a[1], a[2], a[3], a[4]
            } else {
              printf "0.0.0.0"
            }
          }')
          echo "numeric_version=$NUM4" >> "$GITHUB_OUTPUT"
          echo "Display version : $VER"
          echo "Numeric version : $NUM4"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run embedded-Python build
        shell: powershell
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: |
          python build/build-backend.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Build script returned exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Show build output (diagnostic)
        if: always()
        shell: powershell
        run: |
          if (Test-Path build/dist) {
            Write-Host "=== build/dist contents ==="
            Get-ChildItem build/dist -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length |
              Format-Table -AutoSize | Out-String -Width 200
            $size = (Get-ChildItem build/dist -Recurse -File -ErrorAction SilentlyContinue |
                     Measure-Object -Property Length -Sum).Sum
            Write-Host "Total size: $([math]::Round($size / 1MB, 1)) MB"
          } else {
            Write-Host "No build/dist directory was produced."
          }

      - name: Upload backend artifact (cache mirror)
        if: always()
        # 2026-01: continue-on-error so quota-hit doesn't kill the
        # whole workflow. Build still succeeds; downstream installer
        # job will use the cache below (artifact is optional mirror).
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: krexion-backend-bundle
          path: build/dist/krexion-backend.dist/**
          retention-days: 3
          if-no-files-found: warn

      # ── 2026-01 (artifact-quota workaround) ──
      # Save the backend build to the actions/cache store too. Cache
      # has a SEPARATE 10 GB quota from artifacts, so even if artifact
      # upload fails the installer job can still pull it from cache.
      # Key includes the commit SHA so each push gets a fresh cache.
      - name: Cache backend build for installer job
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build/dist/krexion-backend.dist
          key: krexion-backend-${{ github.sha }}-${{ github.run_id }}

  build-frontend:
    name: Build React frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build production bundle
        run: |
          cd frontend
          yarn install --frozen-lockfile
          echo "REACT_APP_BACKEND_URL=http://127.0.0.1:8001" > .env.production
          yarn build

      - name: Upload frontend artifact (cache mirror)
        # 2026-01: continue-on-error → quota-hit non-fatal. Installer
        # job uses cache below as primary, artifact is just a mirror.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: krexion-frontend-build
          path: frontend/build
          retention-days: 3

      # Cache for installer job (10 GB cache quota, separate from artifacts)
      - name: Cache frontend build for installer job
        uses: actions/cache/save@v4
        with:
          path: frontend/build
          key: krexion-frontend-${{ github.sha }}-${{ github.run_id }}
          # v1.0.21 — must be true so this Linux-built cache can be
          # restored by the Windows installer job. Without it the
          # restore step in build-installer reports "Cache not found"
          # and the build falls through to artifact download, which
          # silently fails when GitHub Actions artifact storage quota
          # is exhausted → installer "Verify build outputs" hard-fails.
          enableCrossOsArchive: true

  build-installer:
    name: Build Krexion-Setup.exe
    # 2026-01-09 — self-hosted Windows runner (see build-backend job).
    runs-on: [self-hosted, windows, krexion-windows]
    needs: [build-backend, build-frontend]
    if: always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
    # Timeout raised from 30 -> 75 min in v1.0.10:
    # Bundling Playwright Chromium (~250 MB compressed inside the
    # installer) pushes Inno Setup's lzma2/ultra compression past the
    # previous 30-min budget. Build #22 hit the wall at minute 35 while
    # still inside the silent ISCC compile (12+ min on the chromium
    # folder alone). 75 min gives ~25-30 min of headroom even with
    # slow GitHub-hosted Windows runners.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      # ── 2026-01: Restore from CACHE first (10GB quota, isolated
      #     from artifact 500MB quota). Fallback to artifact download
      #     if cache miss — this dual-path ensures the installer job
      #     can never be blocked by GitHub's artifact quota meter. ──
      - name: Restore backend build from cache
        id: backend-cache
        uses: actions/cache/restore@v4
        with:
          path: build/dist/krexion-backend.dist
          key: krexion-backend-${{ github.sha }}-${{ github.run_id }}

      - name: Download backend artifact (fallback if cache miss)
        if: steps.backend-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: krexion-backend-bundle
          path: build/dist/krexion-backend.dist/

      - name: Restore frontend build from cache
        id: frontend-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/build
          key: krexion-frontend-${{ github.sha }}-${{ github.run_id }}
          # v1.0.21 — paired with the matching flag on the save step
          # in build-frontend (which runs on ubuntu-latest). Windows
          # installer job MUST use this flag too or it will refuse to
          # restore a Linux-saved cache, masking the upstream success.
          enableCrossOsArchive: true

      - name: Download frontend artifact (fallback if cache miss)
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: krexion-frontend-build
          path: build/frontend-build/

      - name: Verify build outputs available
        shell: powershell
        run: |
          # v1.0.21 — the real native entry-point produced by
          # build/build-backend.py is `krexion-core.exe` (renamed
          # python.exe — see build-backend.py:494). Previous version
          # of this check looked for `krexion-backend.exe` which never
          # existed in the output, so this gate failed on every run.
          $backendOk = Test-Path "build/dist/krexion-backend.dist/krexion-core.exe"
          $frontendOk = (Test-Path "build/frontend-build/index.html") -or (Test-Path "frontend/build/index.html")
          # Frontend cache restored to frontend/build (cache's original path)
          # but artifact download went to build/frontend-build. Normalize.
          if (-not (Test-Path "build/frontend-build/index.html") -and (Test-Path "frontend/build/index.html")) {
            New-Item -ItemType Directory -Force -Path "build/frontend-build" | Out-Null
            Copy-Item -Recurse -Force frontend/build/* build/frontend-build/
          }
          Write-Host "backend OK: $backendOk"
          Write-Host "frontend OK: $frontendOk"
          if (-not $backendOk) { throw "Backend build artifact missing from BOTH cache and artifact." }
          if (-not $frontendOk) { throw "Frontend build artifact missing from BOTH cache and artifact." }

      - name: Download MongoDB Portable
        shell: powershell
        run: |
          # MongoDB Portable from MongoDB Inc.'s own CDN. Generally
          # rock-solid, but we wrap it in a 3-attempt retry loop just in
          # case the runner hits a transient TLS/DNS hiccup or fastdl
          # has a regional outage. ~700 MB download = the heaviest step
          # in the whole workflow, so we don't want a one-off blip to
          # waste 13 minutes of build time.
          $url = "https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-7.0.14.zip"
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              Write-Host "Attempt $i of $maxAttempts : downloading MongoDB Portable..."
              Invoke-WebRequest -Uri $url -OutFile build/mongo.zip -UseBasicParsing -TimeoutSec 900
              break
            } catch {
              Write-Warning "Attempt $i failed: $($_.Exception.Message)"
              if ($i -eq $maxAttempts) { throw }
              Start-Sleep -Seconds (10 * $i)
            }
          }
          Expand-Archive -Path build/mongo.zip -DestinationPath build/mongo-extract -Force
          $srcDir = Get-ChildItem build/mongo-extract -Filter "mongodb-*" -Directory | Select-Object -First 1
          if ($srcDir) {
            New-Item -ItemType Directory -Force -Path build/mongo-portable | Out-Null
            Copy-Item -Path "$($srcDir.FullName)\*" -Destination build/mongo-portable -Recurse -Force
          }
          Remove-Item -Path build/mongo.zip,build/mongo-extract -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "=== mongo-portable contents ==="
          Get-ChildItem build/mongo-portable -Recurse -File | Select-Object Name | Select-Object -First 10

      - name: Download Microsoft VC++ Redistributable (required by MongoDB 7.0)
        shell: powershell
        run: |
          # MongoDB 7.0.x mongod.exe links against VCRUNTIME140_1.dll
          # which only ships with the Visual C++ 2015-2022 Redistributable.
          # On a fresh Windows 10 install without recent updates this
          # DLL is missing -> mongod.exe silently fails on first boot
          # and the Krexion Database service never starts.
          # We bundle the redistributable directly into the installer
          # and run it silently (idempotent - exits 1638 if a newer
          # version is already installed).
          New-Item -ItemType Directory -Force -Path build/vcredist | Out-Null
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $out = "build/vcredist/vc_redist.x64.exe"
          for ($i = 1; $i -le 3; $i++) {
            try {
              Write-Host "Attempt $i : downloading vc_redist.x64.exe from aka.ms..."
              Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing -TimeoutSec 180
              break
            } catch {
              Write-Warning "Attempt $i failed: $($_.Exception.Message)"
              if ($i -eq 3) { throw }
              Start-Sleep -Seconds (5 * $i)
            }
          }
          $size = (Get-Item $out).Length
          Write-Host "=== VC++ Redistributable ready: $out ($size bytes) ==="

      - name: Download Microsoft Edge WebView2 Runtime bootstrapper (required by PyWebView)
        shell: powershell
        run: |
          # PyWebView 5.x on Windows uses the EdgeChromium backend which
          # requires Microsoft's WebView2 Runtime. Win11 ships it pre-
          # installed, but a clean Win10 install (especially LTSC /
          # older 1809-1909 builds, Server 2019, N editions) does NOT -
          # the Krexion dashboard window would silently fail to appear
          # (customer only sees krexion.com open in their browser, no
          # local window, no tray icon).
          #
          # We bundle Microsoft's official Evergreen bootstrapper
          # (~1.6 MB) and run it silently from the installer. It is
          # idempotent - exits 0 instantly if WebView2 is already on
          # the PC, otherwise downloads + installs the latest runtime.
          New-Item -ItemType Directory -Force -Path build/webview2 | Out-Null
          $url = "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          $out = "build/webview2/MicrosoftEdgeWebview2Setup.exe"
          for ($i = 1; $i -le 3; $i++) {
            try {
              Write-Host "Attempt $i : downloading WebView2 Evergreen bootstrapper..."
              Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing -TimeoutSec 120
              break
            } catch {
              Write-Warning "Attempt $i failed: $($_.Exception.Message)"
              if ($i -eq 3) { throw }
              Start-Sleep -Seconds (5 * $i)
            }
          }
          $size = (Get-Item $out).Length
          Write-Host "=== WebView2 bootstrapper ready: $out ($size bytes) ==="

      - name: Bundle Playwright Chromium (required by heavy/RUT features)
        shell: powershell
        run: |
          # Krexion's heavy features (Real-User-Traffic, conversion
          # automation, click farms) all drive Playwright Chromium. The
          # backend reads PLAYWRIGHT_BROWSERS_PATH at startup and
          # expects to find chromium-headless-shell + chromium under
          # that folder. If the folder is missing or empty the backend
          # logs "Playwright chromium-headless-shell rev XXX missing"
          # and every heavy job fails immediately on submission.
          #
          # On the dev pod the Playwright runtime auto-downloads at
          # first use, but on a customer's Windows install the bundle
          # we ship is the ONLY copy they get (no internet round-trip
          # at runtime - that breaks behind corporate proxies and
          # creates a 30-90s first-job stall).
          #
          # We invoke Playwright's own CLI on the runner to download
          # the matching Chromium build into a temp folder, then move
          # it under build/chromium-bundle/ which the Inno Setup script
          # picks up via the `..\build\chromium-bundle\*` Source line.
          $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\build\chromium-bundle"
          New-Item -ItemType Directory -Force -Path $env:PLAYWRIGHT_BROWSERS_PATH | Out-Null
          Write-Host "Installing Playwright + downloading Chromium to $env:PLAYWRIGHT_BROWSERS_PATH"
          python -m pip install --upgrade pip
          python -m pip install playwright==1.49.1
          # Both chromium (full) and chromium-headless-shell (smaller,
          # used by the production RUT runner) - the runtime selects
          # one based on the job kind, so we ship both.
          python -m playwright install chromium chromium-headless-shell
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Playwright install returned exit $LASTEXITCODE - continuing build (chromium-bundle may be partial)"
          }
          Write-Host "=== Chromium bundle contents (top level) ==="
          Get-ChildItem build/chromium-bundle -Directory -ErrorAction SilentlyContinue |
            Select-Object Name, FullName | Format-Table -AutoSize | Out-String -Width 200
          $totalSize = (Get-ChildItem build/chromium-bundle -Recurse -File -ErrorAction SilentlyContinue |
                        Measure-Object -Property Length -Sum).Sum
          Write-Host "Total chromium-bundle size: $([math]::Round($totalSize / 1MB, 1)) MB"

      - name: Install NSSM (via Chocolatey + GitHub mirror fallback)
        shell: powershell
        run: |
          # NSSM's official mirror (nssm.cc) is flaky - it has
          # historically returned 503 Service Temporarily Unavailable
          # and gone offline for entire days. The whole native-build
          # pipeline used to depend on one Invoke-WebRequest to that
          # host, which made the build non-deterministic.
          #
          # Reliable fallback chain (first one that succeeds wins):
          #   1. Chocolatey "nssm" package - preinstalled on every
          #      windows-latest runner, fetches via chocolatey.org
          #      (Cloudflare CDN, ~100 percent uptime).
          #   2. nssm.cc with 3-attempt retry - the original source,
          #      kept as backup.
          #   3. web.archive.org wayback snapshot - never goes away.
          New-Item -ItemType Directory -Force -Path build/nssm-portable | Out-Null
          $ok = $false

          # Source 1: Chocolatey
          try {
            Write-Host "[1/3] Installing NSSM via Chocolatey..."
            choco install nssm -y --no-progress --limit-output
            $candidates = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\NSSM" -Recurse -Filter "nssm.exe" -ErrorAction SilentlyContinue
            $real = $candidates | Where-Object { $_.FullName -match 'win64' } | Select-Object -First 1
            if (-not $real) { $real = $candidates | Select-Object -First 1 }
            if ($real) {
              Copy-Item -Path $real.FullName -Destination "build/nssm-portable/nssm.exe" -Force
              Write-Host "    OK from $($real.FullName)"
              $ok = $true
            }
          } catch {
            Write-Warning "[1/3] Chocolatey nssm install failed: $($_.Exception.Message)"
          }

          # Source 2: nssm.cc with retry
          if (-not $ok) {
            $url = "https://nssm.cc/release/nssm-2.24.zip"
            for ($i = 1; $i -le 3; $i++) {
              if ($ok) { break }
              try {
                Write-Host "[2/3] Attempt $i : downloading from nssm.cc..."
                Invoke-WebRequest -Uri $url -OutFile "build/nssm.zip" -UseBasicParsing -TimeoutSec 120
                Expand-Archive -Path "build/nssm.zip" -DestinationPath "build/nssm-extract" -Force
                Copy-Item -Path "build/nssm-extract/nssm-2.24/win64/nssm.exe" -Destination "build/nssm-portable/nssm.exe" -Force
                Remove-Item -Path "build/nssm.zip","build/nssm-extract" -Recurse -Force -ErrorAction SilentlyContinue
                $ok = $true
              } catch {
                Write-Warning "[2/3] nssm.cc attempt $i failed: $($_.Exception.Message)"
                Start-Sleep -Seconds (5 * $i)
              }
            }
          }

          # Source 3: web.archive.org
          if (-not $ok) {
            try {
              Write-Host "[3/3] Falling back to web.archive.org..."
              $wb = "https://web.archive.org/web/2024if_/https://nssm.cc/release/nssm-2.24.zip"
              Invoke-WebRequest -Uri $wb -OutFile "build/nssm.zip" -UseBasicParsing -TimeoutSec 180
              Expand-Archive -Path "build/nssm.zip" -DestinationPath "build/nssm-extract" -Force
              Copy-Item -Path "build/nssm-extract/nssm-2.24/win64/nssm.exe" -Destination "build/nssm-portable/nssm.exe" -Force
              Remove-Item -Path "build/nssm.zip","build/nssm-extract" -Recurse -Force -ErrorAction SilentlyContinue
              $ok = $true
            } catch {
              Write-Warning "[3/3] web.archive.org fallback failed: $($_.Exception.Message)"
            }
          }

          if (-not $ok) {
            Write-Host "::error::All NSSM acquisition methods failed (chocolatey + nssm.cc + web.archive.org)"
            exit 1
          }

          if (-not (Test-Path "build/nssm-portable/nssm.exe")) {
            Write-Host "::error::build/nssm-portable/nssm.exe not present after acquisition"
            exit 1
          }

          $size = (Get-Item "build/nssm-portable/nssm.exe").Length
          Write-Host "=== NSSM ready: build/nssm-portable/nssm.exe ($size bytes) ==="

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Compile installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer/Output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
              /Qp installer/krexion-setup.iss `
              /DAppVersion=${{ needs.build-backend.outputs.version }} `
              /DAppVersionNumeric=${{ needs.build-backend.outputs.numeric_version }}
          Write-Host "=== installer/Output contents ==="
          Get-ChildItem installer/Output -ErrorAction SilentlyContinue

      - name: Upload installer artifact
        if: always()
        # 2026-01: continue-on-error → GitHub Release step still runs.
        # Releases bypass the artifact quota entirely.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: krexion-installer
          path: installer/Output/Krexion-Setup-*.exe
          retention-days: 3
          if-no-files-found: warn

      - name: Create GitHub Release
        # Publish whenever we have a real version (i.e. not a nightly
        # placeholder). Covers BOTH triggers:
        #   - workflow_dispatch with release_tag → uses the input
        #   - push to main on backend/VERSION change → uses VERSION
        # v1.0.18: previously gated only on the manual input which
        # broke the new auto-trigger path (build ran but no Release
        # was created so the customer couldn't download the .exe).
        if: startsWith(needs.build-backend.outputs.version, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-backend.outputs.version }}
          name: Krexion ${{ needs.build-backend.outputs.version }}
          draft: false
          prerelease: false
          files: |
            installer/Output/Krexion-Setup-*.exe
          # Prefer a user-supplied Personal Access Token (added as the
          # repo secret RELEASE_TOKEN) so this step works even when the
          # repo has the strict default "Read repository contents and
          # packages permissions" applied at Settings -> Actions ->
          # General -> Workflow permissions. If RELEASE_TOKEN is not
          # set, fall back to the workflow-scoped GITHUB_TOKEN which
          # works as long as the repo has been flipped to "Read and
          # write permissions" (or our top-level `permissions: contents:
          # write` declaration is honoured). Either path -> release
          # publishes successfully, no 403.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # 2026-06 — SELF-HOSTED MIRROR for the Native (Inno-Setup) installer.
  #
  # Customer ask: "window wale button pr native latest release ka button
  # laga do" — the public DownloadPage on krexion.com needs a SINGLE
  # stable URL for the Windows installer (e.g. .../downloads/windows/
  # Krexion-Setup-latest.exe) so we can rebuild every release without
  # touching the marketing page. GitHub Releases versions the filename
  # (Krexion-Setup-v2.1.57.exe) so a stable redirect isn't possible
  # there alone — mirroring to the VPS gives us the version-less alias.
  #
  # Same pattern as build-electron-desktop.yml's mirror-to-vps job:
  # build runs on Windows, this job runs on Ubuntu (appleboy/scp-action
  # is a Linux-only Docker action), downloads from the just-published
  # GitHub Release, SCPs to /opt/krexion/downloads/windows/ on the VPS,
  # then SSHs in to copy → Krexion-Setup-latest.exe.
  #
  # Required secrets (already configured for deploy.yml + electron mirror):
  #   VPS_HOST, VPS_USER, VPS_PORT (optional), VPS_SSH_KEY
  # ─────────────────────────────────────────────────────────────────
  mirror-windows-to-vps:
    name: Mirror Windows installer to krexion.com VPS
    needs: [build-backend, build-installer]
    runs-on: ubuntu-latest
    # Only mirror when an actual release was created (mirrors the Create
    # GitHub Release gate at line ~557). Skipping otherwise means a
    # dispatch without a release_tag won't try to mirror a non-existent
    # build.
    if: ${{ needs.build-installer.result == 'success' && startsWith(needs.build-backend.outputs.version, 'v') }}
    permissions:
      contents: read
    steps:
      - name: Download installer from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          VER: ${{ needs.build-backend.outputs.version }}
        run: |
          set -e
          mkdir -p dist
          echo "Downloading Krexion-Setup-${VER}.exe from release ${VER}..."
          # Retry up to 6 times — release propagation lag from
          # softprops/action-gh-release@v2 is occasionally up to ~45s.
          for i in 1 2 3 4 5 6; do
            if gh release view "${VER}" -R "${{ github.repository }}" >/dev/null 2>&1; then
              echo "  release visible on attempt $i"
              break
            fi
            echo "  attempt $i: release not visible yet, sleeping 10s..."
            sleep 10
          done
          gh release download "${VER}" \
            -R "${{ github.repository }}" \
            -D dist \
            --pattern 'Krexion-Setup-*.exe'
          ls -lah dist/

      - name: SCP installer to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist/Krexion-Setup-*.exe"
          target: "/opt/krexion/downloads/windows/"
          strip_components: 1
          overwrite: true

      - name: Update "latest" copy + permissions on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 5m
          script: |
            set -e
            mkdir -p /opt/krexion/downloads/windows
            cd /opt/krexion/downloads/windows
            V="${{ needs.build-backend.outputs.version }}"
            # Hard-copy (not symlink) so the nginx docker volume mount
            # serves the file identically to versioned ones — matches
            # the desktop mirror's behaviour.
            if [ -f "Krexion-Setup-${V}.exe" ]; then
              cp -f "Krexion-Setup-${V}.exe" "Krexion-Setup-latest.exe"
            else
              echo "::warning::Expected Krexion-Setup-${V}.exe but not found — picking newest .exe instead"
              NEWEST=$(ls -t Krexion-Setup-*.exe 2>/dev/null | grep -v latest | head -1)
              [ -n "$NEWEST" ] && cp -f "$NEWEST" "Krexion-Setup-latest.exe" || true
            fi
            ls -la
            chmod -R a+r .
            echo "Self-hosted CDN updated:"
            echo "  https://krexion.com/downloads/windows/Krexion-Setup-latest.exe"
