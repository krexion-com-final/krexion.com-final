name: Build Native Windows Release

# ════════════════════════════════════════════════════════════════════════
# Krexion — Embedded-Python Windows build pipeline
# ════════════════════════════════════════════════════════════════════════
# Uses the embedded-Python approach (same as Calibre, Anki, etc.) instead
# of PyInstaller/Nuitka compilation. ~99% first-try success rate.
# ════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty for nightly build (no GH Release).'
        required: false
        default: ''

concurrency:
  group: krexion-native-build-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────
# `contents: write` is required by softprops/action-gh-release@v2 in the
# final "Create GitHub Release" step. Since 2023 GitHub ships repos with
# the default GITHUB_TOKEN scoped to read-only, so without this line the
# release step fails with:
#     HTTP 403 "Resource not accessible by integration"
# We grant the minimum permissions needed; everything else stays default
# (read-only), so workflows can still check out code and download deps.
# ──────────────────────────────────────────────────────────────────────
permissions:
  contents: write

jobs:
  build-backend:
    name: Bundle backend (embedded Python)
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      numeric_version: ${{ steps.version.outputs.numeric_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          # `version` = human/display tag — used for filenames, GitHub
          # Release title, and AppVersion in installer branding. Can be
          # anything (e.g. "v1.0.5", "nightly-20260602-1430").
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            VER="${{ github.event.inputs.release_tag }}"
          else
            VER="nightly-$(date +%Y%m%d-%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

          # `numeric_version` = strict X.X.X.X (digits + dots, max 4
          # parts) — required by Inno Setup's VersionInfoVersion field
          # which feeds into the Windows EXE FILEVERSION resource.
          #
          # Why this is done with `awk` instead of `read`+IFS: the
          # GitHub Actions default `bash` is invoked with
          # `set -eo pipefail`, and `IFS='.' read -r A B C D <<<"$X"`
          # returns non-zero whenever the input has fewer than 4
          # fields (read hits EOF before filling D), which silently
          # kills the whole step.
          #
          # We use `*` instead of `{0,3}` so this works on both mawk
          # (Linux/macOS default) and gawk (Git Bash on Windows) —
          # mawk doesn't support ERE interval quantifiers without
          # `--re-interval`. We then cap the array to 4 parts after
          # splitting.
          #
          # Examples:
          #   v1.0.5            -> 1.0.5.0
          #   v2.0.0-beta1      -> 2.0.0.0
          #   1.0.5.10-rc2      -> 1.0.5.10
          #   1.2.3.4.5         -> 1.2.3.4    (extras dropped)
          #   nightly-20260602  -> 0.0.0.0
          #   v1                -> 1.0.0.0
          NUM4=$(echo "$VER" | awk '{
            if (match($0, /^v?[0-9]+(\.[0-9]+)*/)) {
              s = substr($0, RSTART, RLENGTH)
              sub(/^v/, "", s)
              n = split(s, a, ".")
              if (n > 4) n = 4
              for (i = n + 1; i <= 4; i++) a[i] = "0"
              printf "%s.%s.%s.%s", a[1], a[2], a[3], a[4]
            } else {
              printf "0.0.0.0"
            }
          }')
          echo "numeric_version=$NUM4" >> "$GITHUB_OUTPUT"
          echo "Display version : $VER"
          echo "Numeric version : $NUM4"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run embedded-Python build
        shell: powershell
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: |
          python build/build-backend.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Build script returned exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Show build output (diagnostic)
        if: always()
        shell: powershell
        run: |
          if (Test-Path build/dist) {
            Write-Host "=== build/dist contents ==="
            Get-ChildItem build/dist -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length |
              Format-Table -AutoSize | Out-String -Width 200
            $size = (Get-ChildItem build/dist -Recurse -File -ErrorAction SilentlyContinue |
                     Measure-Object -Property Length -Sum).Sum
            Write-Host "Total size: $([math]::Round($size / 1MB, 1)) MB"
          } else {
            Write-Host "No build/dist directory was produced."
          }

      - name: Upload backend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: krexion-backend-bundle
          path: build/dist/krexion-backend.dist/**
          retention-days: 14
          if-no-files-found: warn

  build-frontend:
    name: Build React frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build production bundle
        run: |
          cd frontend
          yarn install --frozen-lockfile
          echo "REACT_APP_BACKEND_URL=http://127.0.0.1:8001" > .env.production
          yarn build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: krexion-frontend-build
          path: frontend/build
          retention-days: 14

  build-installer:
    name: Build Krexion-Setup.exe
    runs-on: windows-latest
    needs: [build-backend, build-frontend]
    if: always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: krexion-backend-bundle
          path: build/dist/krexion-backend.dist/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: krexion-frontend-build
          path: build/frontend-build/

      - name: Download MongoDB Portable
        shell: powershell
        run: |
          $url = "https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-7.0.14.zip"
          Invoke-WebRequest -Uri $url -OutFile build/mongo.zip -UseBasicParsing
          Expand-Archive -Path build/mongo.zip -DestinationPath build/mongo-extract -Force
          $srcDir = Get-ChildItem build/mongo-extract -Filter "mongodb-*" -Directory | Select-Object -First 1
          if ($srcDir) {
            New-Item -ItemType Directory -Force -Path build/mongo-portable | Out-Null
            Copy-Item -Path "$($srcDir.FullName)\*" -Destination build/mongo-portable -Recurse -Force
          }
          Remove-Item -Path build/mongo.zip,build/mongo-extract -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "=== mongo-portable contents ==="
          Get-ChildItem build/mongo-portable -Recurse -File | Select-Object Name | Select-Object -First 10

      - name: Download NSSM
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://nssm.cc/release/nssm-2.24.zip" `
                            -OutFile build/nssm.zip -UseBasicParsing
          Expand-Archive -Path build/nssm.zip -DestinationPath build/nssm-extract -Force
          New-Item -ItemType Directory -Force -Path build/nssm-portable | Out-Null
          Copy-Item -Path build/nssm-extract/nssm-2.24/win64/nssm.exe `
                    -Destination build/nssm-portable/nssm.exe -Force
          Remove-Item -Path build/nssm.zip,build/nssm-extract -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Compile installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer/Output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
              /Qp installer/krexion-setup.iss `
              /DAppVersion=${{ needs.build-backend.outputs.version }} `
              /DAppVersionNumeric=${{ needs.build-backend.outputs.numeric_version }}
          Write-Host "=== installer/Output contents ==="
          Get-ChildItem installer/Output -ErrorAction SilentlyContinue

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: krexion-installer
          path: installer/Output/Krexion-Setup-*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Krexion ${{ github.event.inputs.release_tag }}
          draft: false
          prerelease: false
          files: |
            installer/Output/Krexion-Setup-*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
