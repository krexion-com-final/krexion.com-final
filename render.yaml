# ============================================================
#  RealFlow -- One-Click Cloud Deploy (Render.com Blueprint)
# ============================================================
#  This file tells Render.com EXACTLY how to deploy RealFlow
#  to the cloud directly from GitHub.
#
#  USAGE:
#  1. Go to: https://dashboard.render.com/blueprints
#  2. Click "New Blueprint Instance"
#  3. Connect your GitHub repo (ronaldsexedwards40-glitch/dynabook)
#  4. Render finds this file automatically -> deploys everything
#  5. After 10 min you get a permanent URL like:
#        https://realflow-XXXX.onrender.com
#
#  Auto-deploys on every git push to main.
#  No Emergent. No local PC. Lives on the cloud.
# ============================================================

services:

  # ──────────────────────────────────────────────────
  # Backend API (FastAPI + Python)
  # ──────────────────────────────────────────────────
  - type: web
    name: realflow-backend
    runtime: docker
    plan: starter          # $7/mo, always-on. Use "free" for sleep-on-idle.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore      # closest to Pakistan/India users
    branch: main
    autoDeploy: true       # auto re-deploy on every git push
    envVars:
      - key: MONGO_URL
        fromDatabase:
          name: realflow-mongo
          property: connectionString
      - key: DB_NAME
        value: realflow
      - key: JWT_SECRET_KEY
        generateValue: true   # Render generates a strong secret
      - key: ADMIN_EMAIL
        value: admin@realflow.local
      - key: ADMIN_PASSWORD
        generateValue: true   # Render generates, you check dashboard for value
      - key: POSTBACK_TOKEN
        generateValue: true
      - key: APP_URL
        sync: false           # set this after frontend deploys
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: RUT_MAX_CONCURRENCY
        value: "4"            # MID tier defaults (4 GB plan)
      - key: RUT_MEM_LIMIT_MB
        value: "3000"
      - key: RESEND_API_KEY
        sync: false           # you add this after signup
    healthCheckPath: /api/diagnostics/health

  # ──────────────────────────────────────────────────
  # Frontend (React static site)
  # ──────────────────────────────────────────────────
  - type: web
    name: realflow-frontend
    runtime: static
    plan: free                # frontend is always free (static)
    buildCommand: cd frontend && yarn install && yarn build
    staticPublishPath: ./frontend/build
    branch: main
    autoDeploy: true
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: realflow-backend
          type: web
          property: host       # auto-injects backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA routing

# ──────────────────────────────────────────────────
# MongoDB (managed database)
# ──────────────────────────────────────────────────
databases:
  - name: realflow-mongo
    plan: starter             # $7/mo for managed Mongo on Render
    databaseName: realflow
    region: singapore
    # If you want FREE Mongo: use MongoDB Atlas (https://mongodb.com/atlas)
    # then set MONGO_URL env var manually instead of fromDatabase.
