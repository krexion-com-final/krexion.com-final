# ────────────────────────────────────────────────────────────────────────────
# electron-builder configuration for Krexion Desktop (parallel native build)
# ────────────────────────────────────────────────────────────────────────────
# Produces a different artifact name than the existing Inno-Setup installer:
#
#   dist/Krexion-Desktop-Setup-<version>.exe
#
# The classic installer (installer/Output/Krexion-Setup-X.X.X.exe) is NOT
# touched. Both can coexist on GitHub Releases without overwriting each other.
# ────────────────────────────────────────────────────────────────────────────

appId: com.krexion.desktop
productName: Krexion Desktop
copyright: Copyright © 2026 Krexion

directories:
  output: dist
  buildResources: build

# Only ship the Electron source, not the (huge) cached downloads.
files:
  - "src/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/electron/dist/**"
  - "!.cache/**"

# `resources/krexion/**` is large (Python + MongoDB + frontend + backend).
# We mark it as `extraResources` so electron-builder copies it into the
# packaged app under `resources/krexion/`, exactly where main.js expects it.
extraResources:
  - from: "resources/krexion"
    to: "krexion"
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "node_modules/electron-log/**"

# Single-arch Windows x64 build — matches the customer base of the existing
# Inno-Setup installer.
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "Krexion-Desktop-Setup-${version}.exe"
  publisherName: Krexion
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Krexion Desktop
  uninstallDisplayName: Krexion Desktop
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  include: build/installer.nsh
  artifactName: "Krexion-Desktop-Setup-${version}.exe"
  deleteAppDataOnUninstall: false

# Build is local-only; CI uploads the artifact to a GitHub Release explicitly.
# We do NOT want electron-builder itself to push to GitHub during the build
# step (we use --publish never on the CLI). BUT we still need a `publish`
# block here so that electron-builder generates the `latest.yml` update
# manifest in dist/ — that file is what electron-updater (running inside
# the installed customer app) reads to detect new versions.
#
# ── 2026-02: SELF-HOSTED auto-update via krexion.com VPS ────────────
# Previously this pointed at GitHub Releases. We've moved the canonical
# update channel to our own VPS so customers never hit GitHub rate
# limits (60 req/hr unauthenticated) and so we control redirects,
# caching, and bandwidth. The GitHub release is still produced as a
# backup mirror in build-electron-desktop.yml.
#
# Installed Electron clients will, on next launch, fetch:
#
#   https://krexion.com/downloads/desktop/latest.yml
#
# compare versions, silently background-download the new .exe, and
# prompt to restart-and-install.
publish:
  - provider: generic
    url: https://krexion.com/downloads/desktop
    channel: latest
    useMultipleRangeRequest: true
