# RealFlow — nginx config for the production React build.
# Proxies /api/*, /health, and /{short_code} redirect paths to the backend.

upstream realflow_backend {
    # "backend" is the service name in docker-compose.yml
    server backend:8001;
}

server {
    listen 80;
    server_name _;

    # Allow large file uploads (xlsx / proxies / ua lists can be big)
    client_max_body_size 100M;

    # ─── Proxy API calls to FastAPI ─────────────────────────────
    location /api/ {
        proxy_pass         http://realflow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Backend health endpoint ────────────────────────────────
    location = /health {
        proxy_pass http://realflow_backend;
        proxy_set_header Host $host;
    }

    # ─── WebSocket for live click updates ───────────────────────
    location /ws/ {
        proxy_pass         http://realflow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_read_timeout 3600s;
    }

    # ─── Short-link redirect (non-/api aliases) ─────────────────
    # Server exposes redirects at BOTH /api/r/{code} and /r/{code}, /t/{code}.
    # The /api prefix is already proxied; the short aliases below are handy
    # for users who share http://localhost:3000/r/abc123 links.
    location ~ ^/(r|t)/ {
        proxy_pass       http://realflow_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Self-hosted Krexion Desktop CDN (2026-02) ──────────────
    # The GitHub Actions Electron build workflow SCPs the latest
    # installer .exe + electron-updater latest.yml + .blockmap to
    # /opt/krexion/downloads/desktop/ on the VPS host. That folder
    # is bind-mounted into this container at
    # /usr/share/nginx/html/downloads (see docker-compose.yml).
    #
    # • .exe       → big binary, support Range so the browser /
    #                electron-updater can resume partial downloads
    # • .yml       → tiny manifest, MUST NOT be cached (always fetch
    #                the latest version number)
    # • .blockmap  → big binary, delta updates
    location /downloads/ {
        root             /usr/share/nginx/html;
        sendfile         on;
        tcp_nopush       on;
        tcp_nodelay      on;
        autoindex        off;

        # Range requests for big binaries (default ON in 1.21+, explicit
        # for clarity). electron-updater + browsers BOTH rely on this.
        add_header Accept-Ranges bytes;

        # CORS for electron-updater XHR pulls (it runs from a custom
        # `app://` protocol, not from a normal http origin).
        add_header Access-Control-Allow-Origin  "*"      always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, If-None-Match, If-Modified-Since" always;

        # latest.yml: NEVER cache. Always fetch the live version number
        # so when the admin pushes a new release every installed client
        # sees the new version on the very next launch.
        location ~ \.yml$ {
            root            /usr/share/nginx/html;
            add_header      Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header      Pragma "no-cache" always;
            add_header      Expires "0" always;
            add_header      Access-Control-Allow-Origin "*" always;
            try_files       $uri =404;
        }

        # Anything else under /downloads/ — fall back to 404 if missing.
        try_files $uri =404;
    }

    # ─── React SPA — everything else ────────────────────────────
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        root       /usr/share/nginx/html;
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }
}
